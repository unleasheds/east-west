<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Dark charcoal background matching brand -->
  <rect width="100" height="100" rx="20" fill="#3A3740"/>

  <!-- Crescent body (outer circle minus inner offset circle via mask) -->
  <defs>
    <mask id="crescent-mask">
      <circle cx="44" cy="59" r="31" fill="white"/>
      <circle cx="56" cy="47" r="24" fill="black"/>
    </mask>
  </defs>
  <circle cx="44" cy="59" r="31" fill="#E4A853" mask="url(#crescent-mask)"/>

  <!-- Head — small circle at upper-right of crescent opening -->
  <circle cx="68" cy="27" r="9" fill="#E4A853"/>
</svg>
